name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Create mock google-services.json
      run: |
        cat <<EOF > app/google-services.json
        {
          "project_info": { "project_number": "1234567890", "project_id": "dummy" },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:1234567890:android:1234",
                "android_client_info": { "package_name": "com.erygra.maskoflight" }
              },
              "api_key": [{ "current_key": "dummy" }]
            },
            {
              "client_info": {
                "mobilesdk_app_id": "1:1234567890:android:5678",
                "android_client_info": { "package_name": "com.erygra.maskoflight.debug" }
              },
              "api_key": [{ "current_key": "dummy" }]
            }
          ],
          "configuration_version": "1"
        }
        EOF

    - name: Build with Gradle
      run: gradle build --no-daemon

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
